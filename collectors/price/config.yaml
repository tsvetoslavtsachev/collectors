# collectors/price -- canonical daily ETF price citizen (INIT-22 P3).
# ONE yfinance pull/day for the ETF universe -> EVERY bar (split-adj OHLCV + adj
# close + split/dividend factors) written through the P1 primitive
# (datacore.archive.append) into the SEPARATE price-archive store (P2), append-only
# + year-partitioned + bitemporal. ETF only (131 ETF-rr universe + idx_dxy = 132);
# stocks are P7+. Backfill to inception = P4. P3 writes a TEMP archive root only.
#
# series_id -> {symbol, name, category}. Each series is one px_<ticker>_daily.
# Universe = an EXACT snapshot of ETF-rr src/universe.py get_universe_tickers()
# (131, survivorship-clean) + idx_dxy (DX-Y.NYB) from the VRM collector.
#
# Cardinal rule: this deterministic fetch->archive path is the only price writer;
# a model never writes here. P3 build writes ONLY a TEMP DATACORE_ROOT (real
# prices arrive in P4 after sign-off).

settings:
  history_period_prices: "max"   # full-history daily pull (yfinance period=max); P4 backfill -- ETF family
  history_period_stock: "6y"     # STOCK family TA floor (P7a): ~6y covers 50/200-DMA + RSI + MACD with
                                 # huge margin (50-DMA needs ~50 trading days). Stocks are survivorship-
                                 # flagged (backtest_valid:false) so a longer pull is NOT backtest-honest
                                 # anyway (program S3c) -- 6y is the binding TA depth, not a compromise.
                                 # Applied per-family when no explicit --period is given (fetch_prices).
  daily_period: "1mo"            # SHORT routine-daily window (P5 `run --daily`): the new bar +
                                 # re-finalize of the prior provisional tip + the last few
                                 # restatements -- and it BOUNDS the value_tr dividend cascade
                                 # to ~this window (a "max" daily pull would cascade-restate ALL
                                 # history on every ex-dividend). 1mo (~21 trading days) also
                                 # self-heals a few missed runs (holidays / CI outage) SHORTER
                                 # than the window; a per-symbol gap LONGER than 1mo leaves a hole
                                 # the daily run cannot reach (surfaced by verify_backfill --daily
                                 # v2c; heal it with a one-off `run --period max` for that symbol).
                                 # LIMITATION (value_tr): because the window never re-touches a
                                 # pre-window bar, every bar older than ~this window keeps the
                                 # dividend-adjusted Adj Close (value_tr) that was current when it
                                 # last fell in-window. So the stored value_tr is NOT identical to
                                 # a fresh full pull -- it drifts ~the dividend yield/year at the
                                 # window boundary. CORRECTION (P7a adversarial gate): the split-
                                 # adjusted `close`/`value` (what TA -- 50/200-DMA, RSI, MACD -- uses)
                                 # is unaffected by DIVIDENDS but NOT by SPLITS. A stock split rewrites
                                 # EVERY prior close by the split ratio; a short daily window never re-
                                 # touches pre-window bars (archive.append restates only as_ofs in the
                                 # incoming batch), so the stored pre-window `close` strands at the OLD
                                 # scale -- a ~Nx cliff (e.g. NVDA 10:1) in exactly the series TA reads.
                                 # ETFs effectively never split, so this was dormant; the STOCK family
                                 # (P7a) makes it live. P8 (stock daily CI) MUST design a split-aware
                                 # re-heal (split_factor-tip-change -> per-symbol `run --period max`, or
                                 # a scheduled monthly full stock re-pull) BEFORE turning stock CI on.
                                 # A consumer needing an
                                 # EXACT total-return series must recompute value_tr from the stored
                                 # `close` + `dividend` (reconstructible to ~0.03%), or a periodic
                                 # (e.g. monthly) `run --period max` can re-heal value_tr across
                                 # history at bounded frequency. P1 _NON_VALUE_KEYS stays untouched.
  spot_check_period: "1mo"       # short window for the Gate 2 live spot-check (a few ETFs)
  round_dp: 6                    # price rounding (matches the VRM collector); volume stays int
  source: "yfinance"
  archive_namespace: "px_"       # register_catalog upserts ONLY this namespace
  daily_families: ["etf", "stock"]  # P8a FAMILY-SCOPE guard (program Капан 1): `run --daily`
                                 # (the SHORT-window scheduled path) appends ONLY these families.
                                 # P8b LANDED: stock split-heal ships (run.py heals any in-window
                                 # split before the ~Nx TA cliff can strand pre-split bars, e.g.
                                 # NVDA 10:1), so US stocks now join the daily run. STOXX stay OUT
                                 # automatically: _daily_ready_scope drops unregistered families.
                                 # As-built (P8b/P8c): 132 etf + 503 SP500 + 608 STOXX600 = 1243
                                 # registered+stamped. HON re-backfilled 2026-07-03 (quarantine
                                 # lifted). 2026-07-03: ROG.SW renamed ROP.SW (symbol swap, identity
                                 # continued SEC-000840; 609th now registered); CTRA retired (merged
                                 # into DVN) -> retired:true drops it from fetch+verify scope.
                                 # A FULL manual pull (no --daily) is unscoped (re-pulls every bar
                                 # -> no cliff). idx_dxy omits family -> defaults to etf -> in the run.
  # CI PERF BUDGET (P7a gate note, for the P8 stock daily CI): archive.append re-reads each
  # series' FULL on-disk history per call -- linear in accumulated bars, NOT O(N^2), no cliff.
  # A full-universe daily run is ~linear in series count. Gate EXTRAPOLATION (UNMEASURED,
  # [DOGADKA]): ~33s @ 635 series, ~62s @ ~1200 (with STOXX). Size the P8 CI timeout for the
  # end state; consider lazy-loading only the year buffers a batch touches. MEASURE before
  # relying on these figures -- order-of-magnitude estimate, not a benchmark.

