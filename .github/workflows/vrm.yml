name: vrm-weekly

# Needs repo secrets:
#   DATACORE_PAT   - PAT (repo scope) to checkout + push the private data-core
#   FRED_API_KEY   - FRED api.stlouisfed.org key (macro feed); set on THIS repo
#
# Refreshes the 51 VRM canonical series -- the "food pipe" (INIT-22 E4/E5): yfinance
# prices/idx + ^VIX/^MOVE bridge, FRED macro/liquidity levels, computed ahe_yoy +
# pce_nowcast. Mirrors the oil/cot collectors: fetch -> write canonical -> commit.
#
# ISM (macro_ism_mfg / macro_ism_services) is the LICENSED manual holdout. Its slot
# file (ism_manual.json) is gitignored -> NOT in this checkout -> the 2 ISM series
# are skipped here and their EXISTING canonical is preserved untouched (the write
# path skips a series with no records; it never zeroes one). ISM is refreshed LOCALLY
# when Цветослав enters the monthly Bloomberg print. So CI auto-refreshes the 49
# free-source series; ISM stays manual/monthly. (Future option: move the slot into the
# private data-core repo so CI can refresh it too.)
#
# SCOPE -- two stages, same job: (1) refresh the 51 canonical series (the food), then
# (2) run the VRM brain (run_brain.py) so the 9 deterministic state engines + the
# derived registry/card exporters recompute the full VRM state layer (vrm_regime /
# vrm_overlay / B5 / B6 / B8 / matrix / scorecard + registries/cards)
# on that fresh canonical. Both land in one commit (data + health + registries).
# This is the Gate-3
# "brain switch" (INIT-22, 2026-06-24): data-core state is now LIVE weekly.
# Excel/Cowork VRM still RUNS IN PARALLEL and stays the published source of truth -- the
# real flip (skills -> data-core, Excel retired) is a separate holistic call by Цветослав
# after several agreeing parallel weeks. Nothing here publishes; zero client risk.

on:
  schedule:
    - cron: "0 6 * * 6"     # Sat 06:00 UTC -- after the Friday close has settled
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout collectors
        uses: actions/checkout@v5

      - name: Checkout data-core (private)
        uses: actions/checkout@v5
        with:
          repository: tsvetoslavtsachev/data-core
          token: ${{ secrets.DATACORE_PAT }}
          path: _data-core

      # The brain's M-modules (atlas / breadth / amp / inter, steps 11-14) read px_*
      # bars + the catalog from the price archive -- without this checkout they die
      # (2026-07-05 Saturday-rehearsal failure). Contents=READ token only; the brain
      # never writes to the archive.
      - name: Checkout price-archive (private, read-only)
        uses: actions/checkout@v5
        with:
          repository: tsvetoslavtsachev/price-archive
          token: ${{ secrets.PRICE_ARCHIVE_RO_PAT }}
          path: _price-archive
          fetch-depth: 1

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps + writer lib
        run: |
          pip install -r requirements.txt
          pip install -e "./_data-core[watch]"   # [watch] = jsonschema + pyyaml (superset; harmless)

      - name: Run VRM collector
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          DATACORE_ROOT: ${{ github.workspace }}/_data-core
          # In CI the data-core checkout IS the installed package's repo (editable
          # install), so assert_safe_root sees DATACORE_ROOT == "real" and requires the
          # explicit opt-in. Writing to the checkout is the intended CI behavior here
          # (the same as oil/cot writing to their data-core checkout).
          DATACORE_ALLOW_REAL: "1"
        run: python -m collectors.vrm.run

      - name: Run VRM brain (recompute state on the fresh canonical)
        env:
          DATACORE_ROOT: ${{ github.workspace }}/_data-core
          # Same real-base opt-in as the collector step: in CI the data-core checkout IS
          # the editable-installed package repo, so run_brain's assert_safe_root sees
          # DATACORE_ROOT == "real" and requires the explicit flag. The 9 state engines
          # + derived exporters recompute (in dependency order, each an isolated
          # subprocess) on the canonical the collector just wrote; run_brain forces the
          # absolute root into every child env and applies a per-step truncation floor.
          # Writes data/state + the derived registries/cards under migrations/.
          DATACORE_ALLOW_REAL: "1"
          # M-modules (steps 11-14) read the price archive from the checkout above.
          # The 131-ETF universe + the long-history CSV are VENDORED inside data-core
          # (m_atlas/universe_vendored.json · m_inter/data_all_years.csv) -- no other
          # local-machine path leaks into the runner.
          PRICE_ARCHIVE_ROOT: ${{ github.workspace }}/_price-archive
        run: python _data-core/migrations/vrm_brain/run_brain.py

      - name: Commit canonical + state + health + registries -> data-core (private)
        working-directory: _data-core
        run: |
          git config user.name "collectors-bot"
          git config user.email "actions@users.noreply.github.com"
          # Д12 прозорец #2 (2026-07-05, комит-от-CI decision): the brain REGENERATES the
          # derived registries/cards under migrations/ on every run; without committing
          # them the origin copies go stale after each canonical move and the
          # "generated == replay" verify gates run red on every clone. So the runner
          # commits exactly the brain-written registry paths. ks_long stays OUT (a static
          # vendored dataset, no weekly write step -- run_brain only verifies it).
          git add data health \
            migrations/s6e_ks migrations/e1_organism_cards \
            migrations/m_atlas migrations/m_breadth \
            migrations/m_amp migrations/m_inter migrations/e2_dashboard
          git diff --cached --quiet || git commit -m "vrm: $(date -u +%Y-%m-%d) canonical + state + registries write"
          git push
