name: oil

# Needs repo secrets:
#   DATACORE_PAT  - PAT (repo scope) to checkout + push the private data-core
#   EIA_API_KEY   - EIA series C3 (eia.gov/opendata)
#   OPS_PAT       - PAT (tsachev-ops write) for the Health digest; if absent, that step skips

on:
  schedule:
    - cron: "45 15 * * 3"   # Wed, ~75 min after EIA weekly
    - cron: "0 16 * * 5"    # Fri weekly composite
  workflow_dispatch:

permissions:
  contents: write           # commit the светофар into this (collectors) repo

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      OPS_PAT: ${{ secrets.OPS_PAT }}
    steps:
      - name: Checkout collectors
        uses: actions/checkout@v5

      - name: Checkout data-core (private)
        uses: actions/checkout@v5
        with:
          repository: tsvetoslavtsachev/data-core
          token: ${{ secrets.DATACORE_PAT }}
          path: _data-core

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps + writer lib
        run: |
          pip install -r requirements.txt
          pip install -e "./_data-core[watch]"   # [watch] = jsonschema + pyyaml (state write + watchers.yaml)

      - name: Run oil monitor
        env:
          EIA_API_KEY: ${{ secrets.EIA_API_KEY }}
          DATACORE_ROOT: ${{ github.workspace }}/_data-core
        run: python -m collectors.oil.run

      - name: Commit canonical + health -> data-core (private)
        working-directory: _data-core
        run: |
          git config user.name "collectors-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data health
          git diff --cached --quiet || git commit -m "oil: $(date -u +%Y-%m-%d) canonical write"
          git push

      - name: Commit светофар -> collectors
        run: |
          git config user.name "collectors-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs
          git diff --cached --quiet || git commit -m "oil: $(date -u +%Y-%m-%d) светофар"
          git push

      - name: Checkout tsachev-ops (private)
        if: ${{ env.OPS_PAT != '' }}
        uses: actions/checkout@v5
        with:
          repository: tsvetoslavtsachev/tsachev-ops
          token: ${{ secrets.OPS_PAT }}
          path: _ops

      - name: Render + commit Health digest -> tsachev-ops
        if: ${{ env.OPS_PAT != '' }}
        env:
          DATACORE_ROOT: ${{ github.workspace }}/_data-core
        run: |
          python -m datacore.digest --out _ops/Dashboard/Health.md
          cd _ops
          git config user.name "collectors-bot"
          git config user.email "actions@users.noreply.github.com"
          git add Dashboard/Health.md
          git diff --cached --quiet || git commit -m "health: $(date -u +%Y-%m-%d) digest"
          git push

      # Watch (INIT-22 S9): check the trigger conditions against the current
      # canonical/state series, write the derived fired-state into data-core, and
      # render the morning Watch surface into tsachev-ops. Guarded by OPS_PAT like
      # the Health digest; skips cleanly (CI stays green) when the secret is absent.
      # vrm_watch_state commits only when fires actually change (idempotent - no
      # spam); Watch.md re-commits on the date bump, like Health.md.
      - name: Watch -- check triggers, write fired-state + render Watch.md
        if: ${{ env.OPS_PAT != '' }}
        env:
          DATACORE_ROOT: ${{ github.workspace }}/_data-core
        run: |
          python -m datacore.watch --write --out _ops/Dashboard/Watch.md
          cd _data-core
          git config user.name "collectors-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/state
          git diff --cached --quiet || git commit -m "watch: $(date -u +%Y-%m-%d) fired-state"
          git push
          cd ../_ops
          git config user.name "collectors-bot"
          git config user.email "actions@users.noreply.github.com"
          git add Dashboard/Watch.md
          git diff --cached --quiet || git commit -m "watch: $(date -u +%Y-%m-%d) surface"
          git push
