name: alfred-vintage

# INIT-22 M1 (C2.1 bitemporal PIT layer). Pulls the FULL ALFRED vintage history
# of the 7 FRED regime series and writes it to the data-core PIT vintage layer
# (datacore/vintage.py), append-only. Mirrors vrm.yml's checkout/secret pattern.
#
# Needs repo secrets:
#   DATACORE_PAT   - PAT (repo scope) to checkout + push the private data-core
#   FRED_API_KEY   - FRED api.stlouisfed.org key (SAME key as the current-vintage feed)
#
# ISM is NOT pulled here (licensed manual holdout, no ALFRED vintages) -- exactly
# as the current-vintage vrm.yml skips it. The PIT layer's ISM handling is the
# "final = as-lived" assumption, validated offline in the M1 ISM cross-check.
#
# Cadence: monthly is enough -- vintages only accrue on new FRED prints, and the
# append-only layer never re-writes an existing vintage (idempotent re-runs).

on:
  schedule:
    - cron: "0 7 5 * *"     # 5th of each month 07:00 UTC -- after the month's prints settle
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout collectors
        uses: actions/checkout@v5

      - name: Checkout data-core (private)
        uses: actions/checkout@v5
        with:
          repository: tsvetoslavtsachev/data-core
          token: ${{ secrets.DATACORE_PAT }}
          path: _data-core

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps + writer lib
        run: |
          pip install -r requirements.txt
          pip install -e "./_data-core[watch]"

      - name: Pull ALFRED vintages -> PIT layer
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          DATACORE_ROOT: ${{ github.workspace }}/_data-core
          # Same real-base opt-in as vrm.yml: in CI the data-core checkout IS the
          # editable-installed package repo, so vintage.append's assert_safe_root
          # sees DATACORE_ROOT == "real" and requires the explicit flag. Writes ONLY
          # the vintage/ layer (append-only) -- storage.py canonical is untouched.
          DATACORE_ALLOW_REAL: "1"
        run: python -m collectors.vrm.run_alfred

      - name: Commit PIT vintage layer -> data-core (private)
        working-directory: _data-core
        run: |
          git config user.name "collectors-bot"
          git config user.email "actions@users.noreply.github.com"
          git add vintage
          git diff --cached --quiet || git commit -m "alfred: $(date -u +%Y-%m-%d) PIT vintage append"
          git push
